<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>うんどう会 R8年度</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;overflow-x:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a14;color:#f0ede8;}

#navbar{
  position:fixed;top:0;left:0;right:0;z-index:8000;
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.4rem;
  background:rgba(10,10,20,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.07);
  opacity:0;animation:navIn .5s 4.6s ease forwards;
}
@keyframes navIn{to{opacity:1;}}
.nav-logo{display:flex;align-items:center;gap:.7rem;text-decoration:none;}
.nav-logo-img{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-logo-text{font-family:'Shippori Mincho',serif;font-size:.95rem;color:rgba(255,255,255,.8);letter-spacing:.12em;line-height:1.2;}
.nav-logo-sub{font-size:.6rem;color:rgba(255,200,100,.6);letter-spacing:.16em;display:block;}
.nav-menu-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:.5rem .4rem;color:rgba(255,255,255,.7);transition:color .2s;}
.nav-menu-btn:hover{color:#ffcf60;}
.hamburger-bars{display:flex;flex-direction:column;gap:5px;width:22px;}
.hamburger-bars span{display:block;width:22px;height:2px;background:currentColor;border-radius:2px;transition:transform .3s,opacity .3s;transform-origin:center;}
.nav-menu-btn .menu-label{font-size:.58rem;letter-spacing:.1em;margin-top:1px;}
.nav-menu-btn.is-open .hamburger-bars span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-menu-btn.is-open .hamburger-bars span:nth-child(2){opacity:0;transform:scaleX(0);}
.nav-menu-btn.is-open .hamburger-bars span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

#nav-drawer{
  position:fixed;top:56px;right:0;width:min(300px,90vw);
  background:rgba(12,12,24,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);
  border-radius:0 0 0 16px;padding:1rem 0 1.4rem;z-index:7999;
  transform:translateX(110%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow:-12px 12px 40px rgba(0,0,0,.5);
}
#nav-drawer.open{transform:translateX(0);}
.drawer-menu{list-style:none;}
.drawer-menu li{border-bottom:1px solid rgba(255,255,255,.05);}
.drawer-menu li:last-child{border-bottom:none;}
.drawer-menu button{width:100%;display:flex;align-items:center;gap:.9rem;padding:.9rem 1.4rem;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-family:inherit;font-size:.92rem;letter-spacing:.06em;text-align:left;transition:background .15s,color .15s;}
.drawer-menu button:hover{background:rgba(255,200,100,.07);color:#ffcf60;}
.drawer-menu .menu-num{font-size:.68rem;color:rgba(255,200,100,.45);letter-spacing:.1em;min-width:1.4rem;font-family:'Shippori Mincho',serif;}
.drawer-menu .menu-placeholder{color:rgba(255,255,255,.3);font-style:italic;font-size:.82rem;}
#nav-overlay{display:none;position:fixed;inset:0;z-index:7998;background:rgba(0,0,0,.4);}
#nav-overlay.show{display:block;}

#modal-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
#modal-overlay.show{display:flex;}
.modal-box{position:relative;width:100%;max-width:780px;max-height:88svh;background:#0f0f1e;border:1px solid rgba(255,255,255,.1);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:modalIn .32s cubic-bezier(.22,1,.36,1);}
@keyframes modalIn{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.4rem;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);flex-shrink:0;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1.05rem;color:rgba(255,255,255,.88);letter-spacing:.1em;display:flex;align-items:center;gap:.6rem;}
.modal-num{font-size:.7rem;color:rgba(255,200,100,.6);border:1px solid rgba(255,200,100,.25);padding:.15rem .5rem;border-radius:4px;letter-spacing:.08em;}
.modal-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:1.3rem;line-height:1;padding:.3rem .5rem;transition:color .2s;border-radius:6px;}
.modal-close:hover{color:#ff6b6b;background:rgba(255,100,100,.1);}
.modal-body{overflow-y:auto;padding:1.8rem 1.6rem;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
.modal-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:1rem;color:rgba(255,255,255,.25);text-align:center;}
.modal-placeholder .ph-icon{font-size:3.5rem;opacity:.4;}
.modal-placeholder .ph-title{font-size:1rem;color:rgba(255,255,255,.35);letter-spacing:.1em;}
.modal-placeholder .ph-sub{font-size:.8rem;color:rgba(255,255,255,.2);line-height:1.8;}
.map-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,80px);gap:4px;border-radius:12px;overflow:hidden;margin-bottom:1.2rem;}
.map-cell{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:.06em;border-radius:4px;}
.map-cell.highlight{background:rgba(255,200,100,.1);border-color:rgba(255,200,100,.25);color:rgba(255,200,100,.7);}

#intro{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0a0a14;pointer-events:all;}
#poster-wrap{width:min(420px,88vw);aspect-ratio:2/3;position:relative;animation:posterReveal 3.2s cubic-bezier(.22,1,.36,1) forwards,posterFadeOut 1s 3.4s ease-in forwards;transform-origin:center center;}
@keyframes posterReveal{0%{transform:scale(.55);opacity:0;}30%{opacity:1;}80%{transform:scale(1.08);opacity:1;}100%{transform:scale(1.18);opacity:1;}}
@keyframes posterFadeOut{0%{opacity:1;}100%{opacity:0;}}
#poster-wrap svg{width:100%;height:100%;border-radius:8px;box-shadow:0 0 80px rgba(255,180,80,.35),0 0 200px rgba(255,100,60,.2);display:block;}
#intro{animation:introDismiss 0s 4.5s forwards;}
@keyframes introDismiss{to{opacity:0;pointer-events:none;visibility:hidden;}}

#hero{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 1.5rem 4rem;overflow:hidden;}
#hero-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(255,140,60,.18) 0%,transparent 55%),radial-gradient(ellipse at 70% 80%,rgba(80,120,255,.22) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(255,60,120,.1) 0%,transparent 70%);background-color:#0d0d1a;}
#hero-bg::before{content:'';position:absolute;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;opacity:.5;pointer-events:none;}
#hero>*{position:relative;z-index:1;}
.hero-content{width:100%;max-width:900px;opacity:0;animation:heroIn .9s 4.5s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes heroIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* ===== COUNTDOWN ===== */
.countdown-section{text-align:center;padding:3.5rem 0 2rem;}
.countdown-label{font-size:.8rem;letter-spacing:.22em;color:rgba(255,200,100,.7);text-transform:uppercase;margin-bottom:1rem;}
.countdown-display{display:flex;align-items:baseline;justify-content:center;gap:.4rem;line-height:1;}
.countdown-ato{font-family:'Shippori Mincho',serif;font-size:clamp(2.5rem,8vw,5rem);color:rgba(255,255,255,.55);letter-spacing:.04em;}
.countdown-num{font-family:'Shippori Mincho',serif;font-size:clamp(5rem,18vw,11rem);font-weight:800;background:linear-gradient(135deg,#ffcf60 0%,#ff8c40 50%,#ff4f7b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em;line-height:1;}
.countdown-nichi{font-family:'Shippori Mincho',serif;font-size:clamp(2rem,7vw,4.5rem);color:rgba(255,255,255,.55);letter-spacing:.04em;}
.countdown-sub{margin-top:.5rem;font-size:1rem;color:rgba(255,255,255,.35);letter-spacing:.14em;font-variant-numeric:tabular-nums;min-height:1.6em;}
.countdown-date{margin-top:.6rem;font-size:.88rem;color:rgba(255,255,255,.4);letter-spacing:.1em;}

.split-panel{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:2rem;}
@media(max-width:640px){.split-panel{grid-template-columns:1fr;}}
.panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;backdrop-filter:blur(12px);}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);}
.panel-title{font-size:.82rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,200,100,.8);}
.panel-count{font-size:.72rem;background:rgba(255,200,100,.15);color:rgba(255,200,100,.8);padding:.18rem .55rem;border-radius:999px;}
.schedule-list{list-style:none;max-height:340px;overflow-y:auto;padding:.4rem 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
.schedule-item{display:flex;align-items:flex-start;gap:.9rem;padding:.75rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s;}
.schedule-item:last-child{border-bottom:none;}
.schedule-item:hover{background:rgba(255,255,255,.04);}
.sch-date{flex-shrink:0;text-align:center;background:rgba(255,200,100,.1);border:1px solid rgba(255,200,100,.2);border-radius:8px;padding:.35rem .55rem;min-width:52px;}
.sch-month{font-size:.65rem;color:rgba(255,200,100,.7);letter-spacing:.06em;}
.sch-day{font-size:1.1rem;font-weight:700;color:#ffcf60;line-height:1;}
.sch-dow{font-size:.6rem;color:rgba(255,255,255,.4);}
.sch-title{font-size:.88rem;font-weight:500;color:rgba(255,255,255,.88);margin-bottom:.2rem;}
.sch-note{font-size:.75rem;color:rgba(255,255,255,.4);}
.notice-list{list-style:none;max-height:340px;overflow-y:auto;padding:.4rem 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
.notice-item{display:flex;flex-direction:column;gap:.3rem;padding:.8rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s;}
.notice-item:last-child{border-bottom:none;}
.notice-item:hover{background:rgba(255,255,255,.04);}
.notice-meta{display:flex;align-items:center;gap:.6rem;}
.notice-tag{font-size:.65rem;font-weight:700;letter-spacing:.08em;padding:.14rem .5rem;border-radius:4px;}
.tag-info{background:rgba(80,160,255,.2);color:#7bbfff;}
.tag-important{background:rgba(255,80,80,.2);color:#ff8080;}
.tag-update{background:rgba(80,220,140,.2);color:#6edba0;}
.notice-date{font-size:.7rem;color:rgba(255,255,255,.3);}
.notice-title{font-size:.88rem;font-weight:500;color:rgba(255,255,255,.88);}
.notice-body{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.6;}
.admin-toggle{display:flex;align-items:center;gap:.5rem;margin-top:1.2rem;cursor:pointer;color:rgba(255,255,255,.3);font-size:.78rem;letter-spacing:.08em;width:fit-content;margin-left:auto;user-select:none;transition:color .2s;}
.admin-toggle:hover{color:rgba(255,255,255,.6);}
.admin-toggle svg{width:14px;height:14px;fill:currentColor;transition:transform .3s;}
.admin-toggle.open svg{transform:rotate(180deg);}
.admin-box{display:none;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1.2rem;margin-top:.6rem;gap:.9rem;}
.admin-box.visible{display:flex;flex-direction:column;}
.admin-box label{font-size:.72rem;letter-spacing:.1em;color:rgba(255,200,100,.7);margin-bottom:.3rem;display:block;}
.admin-box input,.admin-box textarea,.admin-box select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f0ede8;font-family:inherit;font-size:.85rem;padding:.55rem .8rem;outline:none;transition:border-color .2s;resize:vertical;}
.admin-box input:focus,.admin-box textarea:focus,.admin-box select:focus{border-color:rgba(255,200,100,.45);}
.admin-btn{margin-top:.2rem;background:linear-gradient(135deg,#ffcf60,#ff8c40);color:#0a0a14;font-family:inherit;font-weight:700;font-size:.82rem;letter-spacing:.08em;border:none;border-radius:8px;padding:.65rem 1.2rem;cursor:pointer;transition:opacity .2s,transform .15s;}
.admin-btn:hover{opacity:.85;transform:translateY(-1px);}
.hero-footer{margin-top:2.5rem;text-align:center;font-size:.72rem;color:rgba(255,255,255,.2);letter-spacing:.12em;padding-bottom:1rem;}
</style>
</head>

// ===== COUNTDOWN =====
(function(){
  const target = new Date('2026-09-24T08:30:00');
  function update(){
    const now  = new Date();
    const diff = target - now;
    const ato  = document.getElementById('cdAto');
    const num  = document.getElementById('cdNum');
    const unit = document.getElementById('cdUnit');
    const sub  = document.getElementById('cdSub');
    const pad  = n => String(n).padStart(2,'0');

    if(diff <= 0){
      ato.textContent  = '';
      num.textContent  = '開会';
      unit.textContent = '';
      sub.textContent  = '開会しました！';
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    const days  = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins  = Math.floor((totalSec % 3600) / 60);
    const secs  = totalSec % 60;

    if(days > 0){
      ato.textContent  = 'あと';
      num.textContent  = days;
      unit.textContent = '日';
      sub.textContent  = `${pad(hours)}時間 ${pad(mins)}分 ${pad(secs)}秒`;
    } else {
      ato.textContent  = 'あと';
      num.textContent  = `${pad(hours)}:${pad(mins)}:${pad(secs)}`;
      unit.textContent = '';
      sub.textContent  = '本日開会！';
    }
  }
  update();
  setInterval(update, 1000);
})();

  btn.nextElementSibling.classList.toggle('open',!isOpen);
}

function openModal(key){
  closeDrawer();
  if(key==='album_top'){ renderAlbumTopModal(); return; }
  const page=MODAL_PAGES[key];
  if(!page) return;
  document.getElementById('modal-num').textContent=page.num;
  document.getElementById('modal-title-text').textContent=page.title;
  document.getElementById('modal-body').innerHTML=page.html;
  animateModal();
}
function animateModal(){
  const box=document.getElementById('modal-box');
  box.style.animation='none';
  requestAnimationFrame(()=>{box.style.animation='';});
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow='';
}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleDrawer(){
  const d=document.getElementById('nav-drawer'),o=document.getElementById('nav-overlay'),b=document.getElementById('menuBtn'),l=document.getElementById('menuLabel');
  const isOpen=d.classList.toggle('open');
  o.classList.toggle('show',isOpen);b.classList.toggle('is-open',isOpen);
  l.textContent=isOpen?'閉じる':'メニュー';
}
function closeDrawer(){
  document.getElementById('nav-drawer').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('show');
  document.getElementById('menuBtn').classList.remove('is-open');
  document.getElementById('menuLabel').textContent='メニュー';
}

// ===== DATA =====
const DAYS=['日','月','火','水','木','金','土'];
function loadSchedules(){try{return JSON.parse(localStorage.getItem('sakura_schedule_r8')||'[]');}catch(e){return[];}}
function loadNotices(){try{return JSON.parse(localStorage.getItem('sakura_notices_r8')||'[]');}catch(e){return[];}}
function saveSchedules(d){localStorage.setItem('sakura_schedule_r8',JSON.stringify(d));}
function saveNotices(d){localStorage.setItem('sakura_notices_r8',JSON.stringify(d));}

function renderSchedule(){
  const list=loadSchedules();
  const ul=document.getElementById('scheduleList');
  document.getElementById('sch-count').textContent=list.length+'件';
  if(!list.length){ul.innerHTML='<li style="padding:1.4rem 1.2rem;text-align:center;color:rgba(255,255,255,.25);font-size:.83rem;">日程はまだありません</li>';return;}
  ul.innerHTML=list.map((item,i)=>{
    const d=new Date(item.date+'T00:00:00');
    return `<li class="schedule-item">
      <div class="sch-date"><div class="sch-month">${d.getMonth()+1}月</div><div class="sch-day">${d.getDate()}</div><div class="sch-dow">${DAYS[d.getDay()]}</div></div>
      <div class="sch-body"><div class="sch-title">${escHtml(item.title)}</div>${item.note?`<div class="sch-note">${escHtml(item.note)}</div>`:''}</div>
      <button onclick="delSchedule(${i})" style="margin-left:auto;background:none;border:none;color:rgba(255,80,80,.4);cursor:pointer;font-size:1rem;flex-shrink:0;">✕</button>
    </li>`;
  }).join('');
}

const TAG_MAP={info:{cls:'tag-info',label:'お知らせ'},important:{cls:'tag-important',label:'重要'},update:{cls:'tag-update',label:'更新'}};
function renderNotices(){
  const list=loadNotices();
  const ul=document.getElementById('noticeList');
  document.getElementById('ntc-count').textContent=list.length+'件';
  if(!list.length){ul.innerHTML='<li style="padding:1.4rem 1.2rem;text-align:center;color:rgba(255,255,255,.25);font-size:.83rem;">お知らせはまだありません</li>';return;}
  ul.innerHTML=list.slice().reverse().map((item,ri)=>{
    const i=list.length-1-ri;
    const t=TAG_MAP[item.tag]||TAG_MAP.info;
    return `<li class="notice-item">
      <div class="notice-meta"><span class="notice-tag ${t.cls}">${t.label}</span><span class="notice-date">${item.date}</span>
      <button onclick="delNotice(${i})" style="margin-left:auto;background:none;border:none;color:rgba(255,80,80,.4);cursor:pointer;font-size:.9rem;">✕</button></div>
      <div class="notice-title">${escHtml(item.title)}</div>
      ${item.body?`<div class="notice-body">${escHtml(item.body)}</div>`:''}
    </li>`;
  }).join('');
}

function addSchedule(){
  const date=document.getElementById('schDate').value,title=document.getElementById('schTitle').value.trim(),note=document.getElementById('schNote').value.trim();
  if(!date||!title){alert('日付とタイトルを入力してください');return;}
  const list=loadSchedules();list.push({date,title,note});list.sort((a,b)=>a.date<b.date?-1:1);saveSchedules(list);
  document.getElementById('schDate').value='';document.getElementById('schTitle').value='';document.getElementById('schNote').value='';
  renderSchedule();
}
function delSchedule(i){if(!confirm('削除しますか？'))return;const list=loadSchedules();list.splice(i,1);saveSchedules(list);renderSchedule();}
function addNotice(){
  const tag=document.getElementById('ntcTag').value,title=document.getElementById('ntcTitle').value.trim(),body=document.getElementById('ntcBody').value.trim();
  if(!title){alert('タイトルを入力してください');return;}
  const now=new Date(),date=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  const list=loadNotices();list.push({tag,title,body,date});saveNotices(list);
  document.getElementById('ntcTitle').value='';document.getElementById('ntcBody').value='';
  renderNotices();
}
function delNotice(i){if(!confirm('削除しますか？'))return;const list=loadNotices();list.splice(i,1);saveNotices(list);renderNotices();}

function toggleAdmin(which){
  const ids={sch:'schAdmin',ntc:'ntcAdmin'};
  const tids={sch:'schToggle',ntc:'ntcToggle'};
  const box=document.getElementById(ids[which]),tog=document.getElementById(tids[which]);
  const open=box.classList.toggle('visible');tog.classList.toggle('open',open);
}

// ===== ALBUM =====
const BLOCK_COLORS=['#e03030','#f07820','#d4c000','#e060a0','#40b8d8','#3060d0','#d8d8d8','#9040c0','#30a050'];

function loadBlockAlbum(b){try{return JSON.parse(localStorage.getItem('sakura_album_r8_b'+b)||'[]');}catch(e){return[];}}
function saveBlockAlbum(b,d){localStorage.setItem('sakura_album_r8_b'+b,JSON.stringify(d));}

function renderAlbumBlockGrid(){
  const grid=document.getElementById('albumBlockGrid');
  let total=0;for(let b=1;b<=9;b++)total+=loadBlockAlbum(b).length;
  document.getElementById('alb-count').textContent=total+'枚';
  grid.innerHTML=Array.from({length:9},(_,i)=>{
    const b=i+1,color=BLOCK_COLORS[i],count=loadBlockAlbum(b).length;
    return `<button onclick="openBlockAlbum(${b})" style="background:rgba(255,255,255,.04);border:1px solid ${color}55;border-radius:12px;padding:1.1rem .5rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.5rem;transition:background .18s;font-family:inherit;"
      onmouseover="this.style.background='rgba(255,255,255,.09)';this.style.borderColor='${color}aa';"
      onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.borderColor='${color}55';">
      <span style="width:14px;height:14px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color}99;display:block;"></span>
      <span style="font-size:.9rem;color:rgba(255,255,255,.82);letter-spacing:.06em;">${b}ブロ</span>
      <span style="font-size:.68rem;color:rgba(255,255,255,.3);">${count}枚</span>
    </button>`;
  }).join('');
}

function renderAlbumTopModal(){
  document.getElementById('modal-num').textContent='📸';
  document.getElementById('modal-title-text').textContent='凸アルバム';
  document.getElementById('modal-body').innerHTML=`<div id="modalAlbumGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;"></div>`;
  animateModal();
  const grid=document.getElementById('modalAlbumGrid');
  grid.innerHTML=Array.from({length:9},(_,i)=>{
    const b=i+1,color=BLOCK_COLORS[i],count=loadBlockAlbum(b).length;
    return `<button onclick="openBlockAlbum(${b})" style="background:rgba(255,255,255,.04);border:1px solid ${color}55;border-radius:12px;padding:1.1rem .5rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.5rem;transition:background .18s;font-family:inherit;"
      onmouseover="this.style.background='rgba(255,255,255,.09)';this.style.borderColor='${color}aa';"
      onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.borderColor='${color}55';">
      <span style="width:14px;height:14px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color}99;display:block;"></span>
      <span style="font-size:.9rem;color:rgba(255,255,255,.82);letter-spacing:.06em;">${b}ブロ</span>
      <span style="font-size:.68rem;color:rgba(255,255,255,.3);">${count}枚</span>
    </button>`;
  }).join('');
}

function openBlockAlbum(block){
  const color=BLOCK_COLORS[block-1];
  const list=loadBlockAlbum(block);
  const photosHtml=list.length===0
    ?`<div style="padding:2rem;text-align:center;color:rgba(255,255,255,.25);font-size:.83rem;">まだ写真がありません</div>`
    :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1.2rem;">
        ${list.map((item,i)=>`
          <div style="position:relative;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);">
            <img src="${item.src}" alt="${escHtml(item.caption)}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer;" onclick="openBlockLightbox(${block},${i})"/>
            ${item.caption?`<div style="padding:.3rem .45rem;font-size:.68rem;color:rgba(255,255,255,.4);">${escHtml(item.caption)}</div>`:''}
            <button onclick="delBlockPhoto(${block},${i})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);border:none;color:rgba(255,100,100,.8);cursor:pointer;font-size:.72rem;border-radius:4px;padding:.1rem .35rem;">✕</button>
          </div>`).join('')}
      </div>`;

  document.getElementById('modal-num').textContent=`${block}ブロ`;
  document.getElementById('modal-title-text').textContent=`凸アルバム — ${block}ブロック`;
  document.getElementById('modal-body').innerHTML=`
    <div>
      <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem;">
        <span style="width:12px;height:12px;border-radius:50%;background:${color};box-shadow:0 0 7px ${color}99;display:inline-block;flex-shrink:0;"></span>
        <span style="font-size:.8rem;color:rgba(255,255,255,.4);letter-spacing:.08em;">${list.length}枚</span>
        <button onclick="renderAlbumTopModal()" style="margin-left:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:.75rem;padding:.25rem .75rem;border-radius:6px;cursor:pointer;font-family:inherit;">← ブロック一覧</button>
      </div>
      ${photosHtml}
      <div style="border-top:1px solid rgba(255,255,255,.07);padding-top:.9rem;">
        <div class="admin-toggle" id="albToggle${block}" onclick="toggleBlockAdmin(${block})">
          <svg viewBox="0 0 20 20"><path d="M5 8l5 5 5-5z"/></svg>
          運営用：写真追加
        </div>
        <div class="admin-box" id="albAdmin${block}">
          <div><label>画像ファイル（複数可）</label><input type="file" id="albFile${block}" accept="image/*" multiple style="padding:.4rem .6rem;"/></div>
          <div><label>キャプション（任意）</label><input type="text" id="albCaption${block}" placeholder="例：練習風景"/></div>
          <button class="admin-btn" onclick="addBlockPhotos(${block})">追加する</button>
        </div>
      </div>
    </div>`;
  animateModal();
}

function addBlockPhotos(block){
  const files=document.getElementById('albFile'+block).files;
  const caption=document.getElementById('albCaption'+block).value.trim();
  if(!files.length){alert('画像を選択してください');return;}
  const list=loadBlockAlbum(block);
  let loaded=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      list.push({src:e.target.result,caption});loaded++;
      if(loaded===files.length){saveBlockAlbum(block,list);openBlockAlbum(block);renderAlbumBlockGrid();}
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('albFile'+block).value='';
  document.getElementById('albCaption'+block).value='';
}
function delBlockPhoto(block,i){
  if(!confirm('削除しますか？'))return;
  const list=loadBlockAlbum(block);list.splice(i,1);saveBlockAlbum(block,list);
  openBlockAlbum(block);renderAlbumBlockGrid();
}
function toggleBlockAdmin(block){
  const box=document.getElementById('albAdmin'+block),tog=document.getElementById('albToggle'+block);
  const open=box.classList.toggle('visible');tog.classList.toggle('open',open);
}
function openBlockLightbox(block,i){
  const item=loadBlockAlbum(block)[i];
  const lb=document.createElement('div');
  lb.id='lightbox';
  lb.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.8rem;padding:1rem;';
  lb.innerHTML=`<img src="${item.src}" style="max-width:90vw;max-height:80svh;border-radius:10px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.6);"/>
    ${item.caption?`<div style="color:rgba(255,255,255,.6);font-size:.85rem;letter-spacing:.06em;">${escHtml(item.caption)}</div>`:''}
    <button onclick="document.getElementById('lightbox').remove()" style="position:fixed;top:1rem;right:1rem;background:rgba(255,255,255,.12);border:none;color:white;font-size:1.3rem;width:38px;height:38px;border-radius:50%;cursor:pointer;">✕</button>`;
  lb.addEventListener('click',e=>{if(e.target===lb)lb.remove();});
  document.body.appendChild(lb);
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
